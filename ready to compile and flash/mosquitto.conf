# Mosquitto MQTT Broker Configuration for AI Stethoscope
# Supports TCP (1883) and WebSocket (8080) for Dashboard

# Default listener (TCP, port 1883)
listener 1883
protocol mqtt

# WebSocket listener (port 8080)
listener 8080
protocol websockets

# Security: Allow anonymous (for testing only)
allow_anonymous true

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# Performance
max_connections -1
max_queued_messages 1000

# Persistence
persistence false
