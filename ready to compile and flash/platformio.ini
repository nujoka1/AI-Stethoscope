[platformio]
default_envs = esp32-s3-devkitc-1
src_dir = src
include_dir = include
lib_dir = lib

[env:esp32-s3-devkitc-1]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800

# Build flags optimization
build_flags =
    -O2
    -DARDUINO_LOG_LEVEL=4
    -DTF_LITE_MICRO_OPTIMIZED
    -DCONFIG_SPIRAM_SUPPORT
    -std=c++17

# Memory optimization
board_build.partitions = huge_app.csv
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L

# Libraries - TensorFlow Lite for Microcontrollers
lib_deps =
    tanakamasayuki/TensorFlowLite_ESP32

# Serial monitor options
monitor_filters = send_on_key, esp32_exception_decoder

# ESP32-specific settings
board_build.arduino.memory_type = qio_qspi
board_build.embed_files = 
    src/model/heart_sound_classifier_int8.tflite

[env:debug]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino
build_flags =
    -O0
    -g
    -DDEBUG=1
    -DARDUINO_LOG_LEVEL=5

[env:release]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino
build_flags =
    -Os
    -DRELEASE=1
    -DARDUINO_LOG_LEVEL=2

[env:esp32-s3-devkitc-1-psram]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800

# Enable PSRAM-aware build settings and define CONFIG_USE_PSRAM
build_flags =
    -O2
    -DARDUINO_LOG_LEVEL=4
    -DTF_LITE_MICRO_OPTIMIZED
    -DCONFIG_SPIRAM_SUPPORT
    -DCONFIG_USE_PSRAM
    -std=c++17

# Request PSRAM where supported (PlatformIO/board will ignore if not present)
board_build.psram = 1

# Memory optimization
board_build.partitions = huge_app.csv
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L

# Libraries - TensorFlow Lite for Microcontrollers
lib_deps =
    tanakamasayuki/TensorFlowLite_ESP32

# Serial monitor options
monitor_filters = send_on_key, esp32_exception_decoder

# ESP32-specific settings
board_build.arduino.memory_type = qio_qspi
board_build.embed_files = 
    src/model/heart_sound_classifier_int8.tflite
